version: "3.9"

services:
  bot:
    build: .
    restart: unless-stopped
    env_file: .env
    depends_on:
      mongo:
        condition: service_healthy
    environment:
      - DATABASE_URI=mongodb://mongo:27017
      - DATABASE_NAME=referral_bot
    volumes:
      - ./logs:/app/logs

  mongo:
    image: mongo:7.0
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    ports:
      - "27017:27017"  # Expose for local management tools; remove in production

volumes:
  mongo_data:
